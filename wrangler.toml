name = "pawscord"
compatibility_date = "2024-09-23"

# ─── Cloudflare Pages ─────────────────────────────────────────────────────────
# Build output directory (wrangler Pages deploy reads this)
pages_build_output_dir = "dist"

# Build command is set in CF Pages Dashboard → Settings → Build configuration
# or via GitHub Actions (deploy-pages.yml)

# ─── Custom Domain ─────────────────────────────────────────────────────────────
# Manage in Cloudflare Dashboard → Pages → Custom domains
# Add: pawscord.com  and  www.pawscord.com

# ─── Environment variables (non-secret) ───────────────────────────────────────
# Secrets (VITE_STRIPE_PUBLIC_KEY etc.) set via:
#   wrangler pages secret put VITE_STRIPE_PUBLIC_KEY --project-name pawscord
#   OR CF Dashboard → Pages → Settings → Environment Variables

[vars]
VITE_ENV = "production"
VITE_BASE_PATH = "/"
VITE_BACKEND_URL = "https://api.pawscord.com"
VITE_API_URL = "https://api.pawscord.com"
VITE_API_BASE_URL = "https://api.pawscord.com"
VITE_DJANGO_PORT = "443"
VITE_CDN_ENABLED = "true"
VITE_CDN_URL = "https://media.pawscord.com"
VITE_CDN_PROVIDER = "cloudflare"
VITE_ENABLE_2FA = "true"
VITE_ENABLE_VOICE_MESSAGES = "true"
VITE_ENABLE_MOBILE_NAV = "true"
VITE_RECAPTCHA_SITE_KEY = "6LfhUU0sAAAAALQKKgbT5xKopHIlv2isjdzEKIo4"
VITE_FIREBASE_AUTH_DOMAIN = "pawscord-app.firebaseapp.com"
VITE_FIREBASE_PROJECT_ID = "pawscord-app"
VITE_FIREBASE_STORAGE_BUCKET = "pawscord-app.appspot.com"
VITE_FIREBASE_MESSAGING_SENDER_ID = "563643916260"
VITE_GOOGLE_CLIENT_ID = "774757987258-poa0elqqapnab8eud3tol3h2pilcqe71.apps.googleusercontent.com"

# ─── Preview environment (branch deploys) ─────────────────────────────────────
[env.preview.vars]
VITE_ENV = "staging"
VITE_BASE_PATH = "/"
VITE_BACKEND_URL = "https://pawscord-repo-production.up.railway.app"
VITE_API_URL = "https://pawscord-repo-production.up.railway.app"
VITE_API_BASE_URL = "https://pawscord-repo-production.up.railway.app"
