<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8" />
  <meta name="referrer" content="origin" />

  <!-- 🔒 SECURITY: Content Security Policy is enforced via _headers (Cloudflare Pages HTTP header).
       No meta-tag CSP here — HTTP header policy takes precedence and avoids conflicting policies. -->

  <!-- ⚡ PERFORMANCE: Preload critical resources -->
  <link rel="preconnect" href="https://www.pawscord.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.pawscord.com">
  <link rel="preconnect" href="https://api.pawscord.com" crossorigin>
  <link rel="dns-prefetch" href="https://api.pawscord.com">

  <!-- 🚀 R2 CDN: Preconnect for faster avatar/media loading -->
  <link rel="preconnect" href="https://media.pawscord.com" crossorigin>
  <link rel="dns-prefetch" href="https://media.pawscord.com">

  <!-- ⚡ R2 CDN Logo prefetch (used after boot, not critical for initial splash) -->
  <link rel="prefetch" as="image" href="https://media.pawscord.com/assets/logo.png">

  <!-- ⚡ CRITICAL CSS - MINIMAL (Only splash screen for fast FCP) -->
  <style>
    /* Ultra-minimal critical CSS - ONLY above-the-fold splash */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: #36393f;
      color: #dcddde;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale
    }

    #root {
      width: 100%;
      height: 100vh;
      display: flex
    }

    .splash-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #5865f2, #4752c4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999
    }

    .splash-logo {
      font-size: 48px;
      animation: p 1.5s ease-in-out infinite
    }

    .splash-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite
    }

    .splash-text {
      color: white;
      font-size: 14px;
      font-weight: 500;
      animation: pulse 1.5s ease-in-out infinite
    }

    @keyframes p {

      0%,
      100% {
        transform: scale(1);
        opacity: 1
      }

      50% {
        transform: scale(1.1);
        opacity: .8
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg)
      }

      100% {
        transform: rotate(360deg)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.6
      }

      50% {
        opacity: 1
      }
    }

    /* === INLINE CRITICAL CSS END === */
  </style>

  <!-- ⚡ ASYNC CSS LOADING: Utility classes loaded non-blocking. media swap to 'all' is performed by /boot.js (CSP-safe). -->
  <style id="pawscord-async-utility-css" media="print">
    .flex {
      display: flex;
    }

    .flex-col {
      flex-direction: column;
    }

    .flex-1 {
      flex: 1;
    }

    .items-center {
      align-items: center;
    }

    .justify-center {
      justify-content: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    .slide-up {
      animation: slideUp 0.3s ease-out;
    }
  </style>
  <noscript>
    <style>
      .flex {
        display: flex;
      }

      .flex-col {
        flex-direction: column;
      }

      .flex-1 {
        flex: 1;
      }

      .items-center {
        align-items: center;
      }

      .justify-center {
        justify-content: center;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }

        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }

      .slide-up {
        animation: slideUp 0.3s ease-out;
      }
    </style>
  </noscript>

  <!-- 🐾 PAWSCORD LOGO - Sekme ikonu -->
  <link rel="icon" href="/logo.webp" type="image/webp" />
  <link rel="shortcut icon" href="/logo.webp" type="image/webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5865f2" />
  <meta name="description"
    content="Pawscord - Modern Chat & Voice Platform with real-time messaging, voice channels, and community features." />

  <!-- 🌐 Open Graph (Facebook, Discord, WhatsApp, Telegram link previews) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Pawscord — Modern Chat & Voice Platform" />
  <meta property="og:description"
    content="Real-time messaging, voice channels, forums, gamification, and community features. Available on Web, Android, iOS, and Desktop." />
  <meta property="og:image" content="https://media.pawscord.com/assets/og-banner.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://www.pawscord.com" />
  <meta property="og:site_name" content="Pawscord" />
  <meta property="og:locale" content="en_US" />

  <!-- 🐦 Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Pawscord — Modern Chat & Voice Platform" />
  <meta name="twitter:description" content="Real-time messaging, voice channels, forums, and community features." />
  <meta name="twitter:image" content="https://media.pawscord.com/assets/og-banner.png" />

  <!-- 📱 Additional mobile/app meta -->
  <meta name="application-name" content="Pawscord" />
  <meta name="apple-mobile-web-app-title" content="Pawscord" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="apple-touch-icon" href="/logo192.webp" />
  <link rel="manifest" href="/manifest.json" />
  <!-- 🐾 PAWSCORD - Modern Chat Platform -->
  <title>🐾 Pawscord</title>

  <!-- � CSP-safe boot script: extension error suppression, SW bootstrap, safety net, async-CSS swap, skip-link a11y. Must load before app entry. -->
  <script src="/boot.js" defer></script>

  <!-- Critical CSS - inlined for faster FCP (from src/styles/critical.css) -->
  <style>
    /* === INLINE CRITICAL CSS START (from src/styles/critical.css) === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #dcddde;
      background-color: #36393f;
      overflow: hidden;
    }

    #root {
      width: 100%;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #5865f2 0%, #4752c4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .splash-logo {
      font-size: 48px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.1);
        opacity: 0.8;
      }
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #5865f2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .sidebar {
      width: 240px;
      background-color: #2f3136;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .server-list {
      width: 72px;
      background-color: #202225;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      flex-shrink: 0;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-color: #36393f;
    }

    .header {
      height: 48px;
      background-color: #36393f;
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .message-input-container {
      padding: 16px;
      background-color: #36393f;
    }

    .message-input {
      background-color: #40444b;
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      color: #dcddde;
      font-size: 15px;
      width: 100%;
      outline: none;
    }

    ::-webkit-scrollbar {
      width: 16px;
      height: 16px;
    }

    ::-webkit-scrollbar-track {
      background-color: #2e3338;
      border: 4px solid transparent;
      background-clip: content-box;
    }

    ::-webkit-scrollbar-thumb {
      background-color: #202225;
      border: 4px solid transparent;
      background-clip: content-box;
      border-radius: 8px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: #18191c;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: absolute;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .sidebar.visible {
        transform: translateX(0);
      }

      .server-list {
        width: 56px;
      }
    }

    .hidden {
      display: none !important;
    }

    .invisible {
      visibility: hidden !important;
    }

    .flex {
      display: flex;
    }

    .flex-col {
      flex-direction: column;
    }

    .flex-1 {
      flex: 1;
    }

    .items-center {
      align-items: center;
    }

    .justify-center {
      justify-content: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    .slide-up {
      animation: slideUp 0.3s ease-out;
    }

    /* === INLINE CRITICAL CSS END === */
  </style>

  <!-- App entry: main.jsx awaits window.__pawscordBootstrap (set by /boot.js) before mounting React. -->
  <script type="module" src="/src/main.jsx"></script>

</head>
