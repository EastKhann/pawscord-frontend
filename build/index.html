  <!-- 🔇 Extension Error Suppression -->
  <script>
    // Suppress MetaMask and other extension errors
    window.addEventListener('error', function (e) {
      // Ignore Chrome extension errors
      if (e.filename && e.filename.includes('chrome-extension://')) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }
      // Ignore MetaMask specific errors
      if (e.message && (
        e.message.includes('MetaMask') ||
        e.message.includes('ethereum') ||
        e.message.includes('chrome-extension')
      )) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }
    }, true);

    // Suppress unhandled promise rejections from extensions
    window.addEventListener('unhandledrejection', function (e) {
      if (e.reason && e.reason.message && (
        e.reason.message.includes('MetaMask') ||
        e.reason.message.includes('chrome-extension')
      )) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }
    });

    // Override console.error to filter extension errors
    const originalConsoleError = console.error;
    console.error = function (...args) {
      const message = args.join(' ');
      if (message.includes('chrome-extension') ||
        message.includes('MetaMask') ||
        message.includes('ethereum')) {
        return; // Silent ignore
      }
      originalConsoleError.apply(console, args);
    };
  </script>

  <!-- ⚡ SERVICE WORKER: Register for offline support and caching (web only) -->
  <script>
    // Service Worker sadece web'de çalışır, Electron'da file:// protokolü desteklenmiyor
    const isElectronSW = typeof window !== 'undefined' && (
      window.process?.versions?.electron ||
      window.navigator?.userAgent?.includes('Electron') ||
      window.location?.protocol === 'file:'
    );

    if (!isElectronSW && 'serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        // 🔥 FIX: Önce mevcut SW'leri temizle, sonra yeniden kaydetme
        // Eski self-destruct SW sonsuz reload döngüsü yapıyordu
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const reg of registrations) {
            // Eğer eski service-worker.js kayıtlıysa, unregister et
            if (reg.active && reg.active.scriptURL.includes('service-worker.js')) {
              await reg.unregister();
              console.log('🗑️ Eski SW temizlendi');
            }
          }
        } catch (e) {
          console.warn('SW cleanup error:', e);
        }
        // NOT: service-worker.js artık kayıt edilmiyor
        // VitePWA kendi SW'sini (sw.js) otomatik yönetiyor
      });
    } else if (isElectronSW) {
      console.log('ℹ️ SW skipped: Electron detected');
    }
  </script>

  <!-- ⚡ VITE ENTRY POINT -->
</body>
